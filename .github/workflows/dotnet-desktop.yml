name: Build & Test WPF App

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: RegisterDocuments.sln
      LANG: ru_RU.UTF-8
      LC_ALL: ru_RU.UTF-8

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: dotnet restore $env:Solution_Name

    - name: Build
      run: msbuild $env:Solution_Name /p:Configuration=$env:Configuration /m
      env:
        Configuration: ${{ matrix.configuration }}
        
    - name: Test
      run: dotnet test $env:Solution_Name --configuration $env:Configuration --no-build --logger trx
      env:
        Configuration: ${{ matrix.configuration }}
